<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#000000" />

<!-- PWA manifest (Android home screen, etc.) -->
<link rel="manifest" href="manifest.json" />

<!-- Icons -->
<link rel="icon" type="image/png" href="https://tvasconcellos.github.io/timer/icons/favicon.png" />
<!-- iOS: multiple sizes for better compatibility across devices -->
<link rel="apple-touch-icon" href="https://tvasconcellos.github.io/timer/icons/icon-180.png" />
<link rel="apple-touch-icon" sizes="120x120" href="https://tvasconcellos.github.io/timer/icons/icon-180.png" />
<link rel="apple-touch-icon" sizes="152x152" href="https://tvasconcellos.github.io/timer/icons/icon-180.png" />
<link rel="apple-touch-icon" sizes="167x167" href="https://tvasconcellos.github.io/timer/icons/icon-180.png" />
<link rel="apple-touch-icon" sizes="180x180" href="https://tvasconcellos.github.io/timer/icons/icon-180.png" />
<link rel="apple-touch-icon-precomposed" href="https://tvasconcellos.github.io/timer/icons/icon-180.png" />

<!-- iOS standalone app name when added to home screen -->
<meta name="apple-mobile-web-app-title" content="Unreal Score" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

<title>Unreal Score</title>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: none;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }

  body {
    position: fixed;
    inset: 0;
  }

  .app {
    position: fixed;
    inset: 0;
    display: flex;
    padding: 8px;
    gap: 4px;
    transition: transform 0.3s ease;
    transform-origin: center center;
  }

  /* CSS-rotation fallback removed — iOS users get a "rotate your phone" hint instead */

  .side {
    flex: 1;
    position: relative;
    border-radius: 18px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background-color 0.25s ease;
    cursor: pointer;
  }

  .side.left  { background: #C07887; }
  .side.right { background: #739F7F; }

  .side .score {
    font-weight: 900;
    color: #fff;
    font-size: clamp(120px, 38vmin, 360px);
    line-height: 1;
    letter-spacing: -0.04em;
    font-variant-numeric: tabular-nums;
    transition: transform 0.12s ease;
    pointer-events: none;
    text-shadow: 0 2px 24px rgba(0,0,0,0.08);
  }

  .side.pressed .score {
    transform: scale(0.94);
  }

  /* color swatch in corner — bigger now */
  .swatch-btn {
    position: absolute;
    top: 14px;
    width: 44px;
    height: 44px;
    border-radius: 12px;
    border: 3px solid rgba(255,255,255,0.65);
    background: transparent;
    cursor: pointer;
    z-index: 5;
    transition: transform 0.15s ease;
    box-shadow: 0 2px 6px rgba(0,0,0,0.18);
  }
  .swatch-btn:active { transform: scale(0.92); }
  .side.left  .swatch-btn { left: 14px; }
  .side.right .swatch-btn { right: 14px; }

  /* center elements — VS centered vertically, timer pinned at top */
  .center-stack {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    height: 100%;
    width: 80px;
    pointer-events: none;
    z-index: 10;
  }

  .timer {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    pointer-events: auto;
    background: #fff;
    color: #1f2430;
    border: none;
    padding: 8px 18px;
    border-radius: 999px;
    font-size: 18px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,0,0,0.18);
    transition: transform 0.1s ease;
    white-space: nowrap;
  }
  .timer:active { transform: translateX(-50%) scale(0.95); }
  .timer svg { width: 16px; height: 16px; flex-shrink: 0; }
  .timer.running .clock-icon circle { stroke: #2a9d6e; }
  .timer.paused  .clock-icon circle { stroke: #d97a3a; }

  .vs-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: auto;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #fff;
    border: none;
    color: #1f2430;
    font-weight: 800;
    font-size: 16px;
    letter-spacing: 0.04em;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 14px rgba(0,0,0,0.18);
    transition: transform 0.1s ease;
  }
  .vs-btn:active { transform: translate(-50%, -50%) scale(0.92); }
  .vs-btn::before,
  .vs-btn::after {
    content: "";
    position: absolute;
    top: 12px;
    bottom: 12px;
    width: 8px;
    border: 2px solid transparent;
    pointer-events: none;
  }
  .vs-btn::before {
    left: 6px;
    border-right: none;
    border-top-left-radius: 20px;
    border-bottom-left-radius: 20px;
    border-color: var(--left-color, #C07887);
  }
  .vs-btn::after {
    right: 6px;
    border-left: none;
    border-top-right-radius: 20px;
    border-bottom-right-radius: 20px;
    border-color: var(--right-color, #739F7F);
  }

  /* color picker popover — bigger chips */
  .popover {
    position: absolute;
    top: 68px;
    background: #fff;
    border-radius: 16px;
    padding: 12px;
    display: none;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    z-index: 20;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  }
  .popover.open { display: grid; }
  .side.left  .popover { left: 14px; }
  .side.right .popover { right: 14px; }

  .popover .chip {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    border: 3px solid transparent;
    cursor: pointer;
    padding: 0;
    transition: transform 0.1s ease;
  }
  .popover .chip:active { transform: scale(0.9); }
  .popover .chip.active { border-color: #1f2430; }

  /* hint */
  .hint {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    pointer-events: none;
    text-align: center;
    z-index: 4;
    transition: opacity 0.4s ease;
    white-space: nowrap;
  }
  .hint.hidden { opacity: 0; }

  @media (orientation: portrait) {
    .side .score { font-size: clamp(140px, 32vmin, 280px); }
    .timer { font-size: 16px; padding: 7px 14px; }
    .vs-btn { width: 48px; height: 48px; font-size: 14px; }
    .swatch-btn { width: 40px; height: 40px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="side left" id="leftSide">
    <button class="swatch-btn" id="leftSwatch" aria-label="Change left color"></button>
    <div class="popover" id="leftPopover" role="menu"></div>
    <div class="score" id="leftScore">0</div>
    <div class="hint" id="leftHint">tap +1 · swipe down −1</div>
  </div>

  <div class="side right" id="rightSide">
    <button class="swatch-btn" id="rightSwatch" aria-label="Change right color"></button>
    <div class="popover" id="rightPopover" role="menu"></div>
    <div class="score" id="rightScore">0</div>
    <div class="hint" id="rightHint">tap +1 · swipe down −1</div>
  </div>

  <div class="center-stack">
    <button class="timer" id="timerBtn" aria-label="Timer">
      <svg class="clock-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="9" stroke="#1f2430" stroke-width="2"/>
        <path d="M12 7v5l3 2" stroke="#1f2430" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span id="timerText">00:00</span>
    </button>
    <button class="vs-btn" id="vsBtn" aria-label="Reset both scores">VS</button>
  </div>
</div>

<script>
  const COLORS = [
    "#C07887", "#CB8569", "#BC9C52",
    "#739F7F", "#5A9C96", "#6B8EBD",
    "#957FB2", "#9B758E", "#000000"
  ];

  const STORAGE_KEY = "scoreCounter.v1";

  const state = {
    left:  { score: 0, color: "#C07887" },
    right: { score: 0, color: "#739F7F" },
    timer: { elapsedMs: 0, running: false, startedAt: null }
  };

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const parsed = JSON.parse(raw);
      if (parsed.left)  Object.assign(state.left,  parsed.left);
      if (parsed.right) Object.assign(state.right, parsed.right);
      if (parsed.timer) {
        state.timer.elapsedMs = parsed.timer.elapsedMs || 0;
        state.timer.running = false;
        state.timer.startedAt = null;
      }
    } catch (e) {}
  }

  function saveState() {
    try {
      const snapshot = {
        left: state.left,
        right: state.right,
        timer: { elapsedMs: currentElapsed(), running: false }
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(snapshot));
    } catch (e) {}
  }

  const els = {
    leftSide:    document.getElementById("leftSide"),
    rightSide:   document.getElementById("rightSide"),
    leftScore:   document.getElementById("leftScore"),
    rightScore:  document.getElementById("rightScore"),
    leftSwatch:  document.getElementById("leftSwatch"),
    rightSwatch: document.getElementById("rightSwatch"),
    leftPop:     document.getElementById("leftPopover"),
    rightPop:    document.getElementById("rightPopover"),
    leftHint:    document.getElementById("leftHint"),
    rightHint:   document.getElementById("rightHint"),
    timerBtn:    document.getElementById("timerBtn"),
    timerText:   document.getElementById("timerText"),
    vsBtn:       document.getElementById("vsBtn"),
    app:         document.querySelector(".app")
  };

  function clamp(n) { return Math.max(0, Math.min(99, n)); }

  function render() {
    els.leftScore.textContent  = state.left.score;
    els.rightScore.textContent = state.right.score;
    els.leftSide.style.background  = state.left.color;
    els.rightSide.style.background = state.right.color;
    els.leftSwatch.style.background  = state.left.color;
    els.rightSwatch.style.background = state.right.color;
    els.app.style.setProperty("--left-color",  state.left.color);
    els.app.style.setProperty("--right-color", state.right.color);
    renderPopovers();
  }

  function renderPopovers() {
    [["left", els.leftPop], ["right", els.rightPop]].forEach(([side, pop]) => {
      pop.innerHTML = "";
      COLORS.forEach(c => {
        const chip = document.createElement("button");
        chip.className = "chip" + (state[side].color === c ? " active" : "");
        chip.style.background = c;
        chip.setAttribute("aria-label", `Set ${side} color ${c}`);
        chip.addEventListener("click", (e) => {
          e.stopPropagation();
          state[side].color = c;
          closePopovers();
          render();
          saveState();
        });
        pop.appendChild(chip);
      });
    });
  }

  // ---------- side tap + swipe ----------
  function setupSide(side, elSide) {
    let pointerStart = null;
    let moved = false;
    const SWIPE_THRESHOLD = 40;

    elSide.addEventListener("pointerdown", (e) => {
      if (e.target.closest(".swatch-btn") || e.target.closest(".popover")) return;
      pointerStart = { x: e.clientX, y: e.clientY, t: Date.now() };
      moved = false;
      elSide.classList.add("pressed");
    });

    elSide.addEventListener("pointermove", (e) => {
      if (!pointerStart) return;
      const dy = e.clientY - pointerStart.y;
      const dx = e.clientX - pointerStart.x;
      if (Math.abs(dy) > 8 || Math.abs(dx) > 8) moved = true;
    });

    function endPointer(e) {
      if (!pointerStart) return;
      elSide.classList.remove("pressed");
      const dy = e.clientY - pointerStart.y;
      const dx = e.clientX - pointerStart.x;
      const ax = Math.abs(dx);
      const ay = Math.abs(dy);

      if (dy > SWIPE_THRESHOLD && ay > ax) {
        state[side].score = clamp(state[side].score - 1);
        hideHint(side);
        render();
        saveState();
      } else if (!moved) {
        state[side].score = clamp(state[side].score + 1);
        hideHint(side);
        render();
        saveState();
      }
      pointerStart = null;
    }

    elSide.addEventListener("pointerup", endPointer);
    elSide.addEventListener("pointercancel", () => {
      pointerStart = null;
      elSide.classList.remove("pressed");
    });
  }

  function hideHint(side) {
    (side === "left" ? els.leftHint : els.rightHint).classList.add("hidden");
  }

  setupSide("left",  els.leftSide);
  setupSide("right", els.rightSide);

  // ---------- swatch popovers ----------
  function closePopovers() {
    els.leftPop.classList.remove("open");
    els.rightPop.classList.remove("open");
  }

  els.leftSwatch.addEventListener("click", (e) => {
    e.stopPropagation();
    const wasOpen = els.leftPop.classList.contains("open");
    closePopovers();
    if (!wasOpen) els.leftPop.classList.add("open");
  });
  els.rightSwatch.addEventListener("click", (e) => {
    e.stopPropagation();
    const wasOpen = els.rightPop.classList.contains("open");
    closePopovers();
    if (!wasOpen) els.rightPop.classList.add("open");
  });
  els.leftSwatch.addEventListener("pointerdown",  (e) => e.stopPropagation());
  els.rightSwatch.addEventListener("pointerdown", (e) => e.stopPropagation());
  els.leftPop.addEventListener("pointerdown",  (e) => e.stopPropagation());
  els.rightPop.addEventListener("pointerdown", (e) => e.stopPropagation());

  document.addEventListener("click", (e) => {
    if (!e.target.closest(".popover") && !e.target.closest(".swatch-btn")) {
      closePopovers();
    }
  });

  // ---------- VS reset ----------
  els.vsBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    state.left.score = 0;
    state.right.score = 0;
    render();
    saveState();
  });
  els.vsBtn.addEventListener("pointerdown", (e) => e.stopPropagation());

  // ---------- timer — instant single-tap, true double-tap to reset ----------
  // Strategy: act on every pointerdown immediately. If a second pointerdown
  // lands within DOUBLE_TAP_MS, undo the toggle the first tap made and reset.
  const DOUBLE_TAP_MS = 320;
  let lastTapTime = 0;
  let lastToggleResult = null; // true = we just started, false = we just paused

  els.timerBtn.addEventListener("pointerdown", (e) => {
    e.stopPropagation();
    e.preventDefault();
    const now = Date.now();
    if (now - lastTapTime < DOUBLE_TAP_MS) {
      // second tap inside window → it's a double-tap
      undoLastToggle();
      resetTimer();
      lastTapTime = 0;
      lastToggleResult = null;
    } else {
      // single tap → toggle immediately, no waiting
      lastToggleResult = toggleTimer();
      lastTapTime = now;
    }
  });

  // suppress the click event so it doesn't double-fire after pointerdown
  els.timerBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    e.preventDefault();
  });

  function currentElapsed() {
    if (state.timer.running && state.timer.startedAt != null) {
      return state.timer.elapsedMs + (Date.now() - state.timer.startedAt);
    }
    return state.timer.elapsedMs;
  }

  function toggleTimer() {
    if (state.timer.running) {
      // pause
      state.timer.elapsedMs += Date.now() - state.timer.startedAt;
      state.timer.startedAt = null;
      state.timer.running = false;
      els.timerBtn.classList.remove("running");
      els.timerBtn.classList.add("paused");
      saveState();
      return false;
    } else {
      // start / resume
      state.timer.startedAt = Date.now();
      state.timer.running = true;
      els.timerBtn.classList.add("running");
      els.timerBtn.classList.remove("paused");
      return true;
    }
  }

  function undoLastToggle() {
    // reverse the toggle the first tap of a double-tap just performed
    if (lastToggleResult === true) {
      // we just started — undo by un-starting
      state.timer.startedAt = null;
      state.timer.running = false;
    } else if (lastToggleResult === false) {
      // we just paused — resetTimer will wipe everything anyway, no need to undo
    }
  }

  function resetTimer() {
    state.timer.elapsedMs = 0;
    state.timer.startedAt = null;
    state.timer.running = false;
    els.timerBtn.classList.remove("running", "paused");
    renderTimer();
    saveState();
  }

  function renderTimer() {
    const ms = currentElapsed();
    const totalSec = Math.floor(ms / 1000);
    const mm = String(Math.floor(totalSec / 60)).padStart(2, "0");
    const ss = String(totalSec % 60).padStart(2, "0");
    const displayMm = totalSec >= 60 * 100 ? "99" : mm;
    els.timerText.textContent = `${displayMm}:${ss}`;
  }

  setInterval(renderTimer, 250);

  // ---------- misc ----------
  document.addEventListener("contextmenu", (e) => e.preventDefault());

  let lastTouchEnd = 0;
  document.addEventListener("touchend", (e) => {
    const now = Date.now();
    if (now - lastTouchEnd <= 300) e.preventDefault();
    lastTouchEnd = now;
  }, { passive: false });

  document.addEventListener("visibilitychange", () => {
    if (document.hidden) saveState();
  });
  window.addEventListener("beforeunload", saveState);

  loadState();
  render();
  renderTimer();
</script>
</body>
</html>
